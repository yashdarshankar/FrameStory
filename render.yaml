services:
  - type: web
    name: framestory-backend
    env: python
    branch: version1
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: framestory-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # You will need to manually enter this value in Render dashboard
    disk:
      name: framestory-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: framestory-db
    databaseName: framestory
    user: framestory_usr
    plan: free
